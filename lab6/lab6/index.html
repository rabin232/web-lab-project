<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lab 6 Todo App</title>
  <style>
    * { box-sizing: border-box; box-shadow: none !important; }
    body { margin: 0; font-family: Arial, sans-serif; background: #f1f2f5; }
    .app-container { max-width: 400px; margin: 36px auto; padding: 20px; background: #f8f9fa; border: 1px solid #ddd; }
    input, button, textarea { border: 1px solid #ccc; background: #fff; padding: 8px 10px; font-size: 14px; border-radius: 4px; box-shadow: none !important; }
    button { cursor: pointer; border: 1px solid #666; background: #fff; }
    h1, h2 { margin-bottom: 12px; }
    .hidden { display: none; }
    .todo-item { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ddd; padding: 8px 0; }
    .todo-text { flex: 1; margin-right: 8px; }
    .todo-actions button { margin-left: 4px; }
    .completed { text-decoration: line-through; color: #888; }
    .message { margin-bottom: 12px; color: #d8000c; }
  </style>
</head>
<body>
  <div class="app-container">
    <div id="auth-area">
      <h1>Login / Register</h1>
      <div class="message" id="auth-message"></div>

      <label>Username</label><br>
      <input type="text" id="username" placeholder="Username" /><br><br>
      <label>Password</label><br>
      <input type="password" id="password" placeholder="Password" /><br><br>

      <button id="login-btn">Log In</button>
      <button id="register-btn">Register</button>
    </div>

    <div id="todo-area" class="hidden">
      <h2>Your Todos</h2>
      <div class="message" id="todo-message"></div>

      <div>
        <input type="text" id="new-todo" placeholder="New todo text" style="width: calc(100% - 92px);" />
        <button id="add-todo-btn">Add</button>
      </div>

      <div id="todos-list" style="margin-top: 15px;"></div>
      <button id="logout-btn" style="margin-top: 14px; width: 100%;">Logout</button>
    </div>
  </div>

  <script>
    const authMessage = document.getElementById('auth-message');
    const todoMessage = document.getElementById('todo-message');
    const authArea = document.getElementById('auth-area');
    const todoArea = document.getElementById('todo-area');
    const loginBtn = document.getElementById('login-btn');
    const registerBtn = document.getElementById('register-btn');
    const logoutBtn = document.getElementById('logout-btn');
    const addTodoBtn = document.getElementById('add-todo-btn');
    const todosList = document.getElementById('todos-list');

    let currentUserId = null;

    async function callApi(path, method='GET', body=null) {
      const options = { method, headers: { 'Content-Type': 'application/json' } };
      if (body) options.body = JSON.stringify(body);
      const response = await fetch(path, options);
      const data = await response.json().catch(() => null);
      if (!response.ok) throw new Error(data?.detail || data?.message || 'Server error');
      return data;
    }

    function setAuthErr(msg) {
      authMessage.textContent = msg;
      setTimeout(() => authMessage.textContent = '', 4000);
    }

    function setTodoErr(msg) {
      todoMessage.textContent = msg;
      setTimeout(() => todoMessage.textContent = '', 4000);
    }

    async function refreshTodos() {
      if (!currentUserId) return;
      try {
        const todos = await callApi(`/todos/${currentUserId}`);
        todosList.innerHTML = '';
        if (!todos.length) {
          todosList.innerHTML = '<p>No todos yet</p>';
          return;
        }
        todos.forEach(todo => {
          const row = document.createElement('div');
          row.className = 'todo-item';
          const text = document.createElement('span');
          text.className = 'todo-text' + (todo.completed ? ' completed' : '');
          text.textContent = todo.text;
          row.appendChild(text);

          const actions = document.createElement('div');
          actions.className = 'todo-actions';

          const toggleBtn = document.createElement('button');
          toggleBtn.textContent = todo.completed ? 'Undo' : 'Done';
          toggleBtn.onclick = async () => {
            try {
              await callApi(`/todos/${todo.id}`, 'PUT', { completed: !todo.completed });
              refreshTodos();
            } catch (err) { setTodoErr(err.message); }
          };

          const editBtn = document.createElement('button');
          editBtn.textContent = 'Edit';
          editBtn.onclick = async () => {
            const newText = prompt('Edit text:', todo.text);
            if (newText !== null) {
              try {
                await callApi(`/todos/${todo.id}`, 'PUT', { text: newText });
                refreshTodos();
              } catch (err) { setTodoErr(err.message); }
            }
          };

          const deleteBtn = document.createElement('button');
          deleteBtn.textContent = 'Delete';
          deleteBtn.onclick = async () => {
            if (!confirm('Remove this todo?')) return;
            try {
              await callApi(`/todos/${todo.id}`, 'DELETE');
              refreshTodos();
            } catch (err) { setTodoErr(err.message); }
          };

          actions.append(toggleBtn, editBtn, deleteBtn);
          row.appendChild(actions);
          todosList.appendChild(row);
        });
      } catch (err) {
        setTodoErr(err.message);
      }
    }

    async function loginOrRegister(path) {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();
      if (!username || !password) { setAuthErr('Enter both username/password'); return; }

      try {
        const payload = { username, password };
        const data = await callApi(path, 'POST', payload);
        if (path === '/login') {
          currentUserId = data.user_id;
          authArea.classList.add('hidden');
          todoArea.classList.remove('hidden');
          refreshTodos();
        } else {
          authMessage.textContent = 'Registered. Please login.';
        }
      } catch (err) {
        setAuthErr(err.message);
      }
    }

    loginBtn.addEventListener('click', () => loginOrRegister('/login'));
    registerBtn.addEventListener('click', () => loginOrRegister('/register'));

    addTodoBtn.addEventListener('click', async () => {
      if (!currentUserId) return;
      const textInput = document.getElementById('new-todo');
      const text = textInput.value.trim();
      if (!text) return setTodoErr('ToDo text cannot be empty');
      try {
        await callApi(`/todos/${currentUserId}`, 'POST', { text });
        textInput.value = '';
        refreshTodos();
      } catch (err) { setTodoErr(err.message); }
    });

    logoutBtn.addEventListener('click', () => {
      currentUserId = null;
      todoArea.classList.add('hidden');
      authArea.classList.remove('hidden');
      document.getElementById('username').value = '';
      document.getElementById('password').value = '';
      todosList.innerHTML = '';
    });
  </script>
</body>
</html>
